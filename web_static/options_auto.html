<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Options Auto</title>
    <link rel="stylesheet" href="/static/app.css">
    <link rel="stylesheet" href="/static/options_auto.css">
  </head>
  <body>
    <div class="oa-shell">
      <header class="oa-topbar">
        <div>
          <a class="oa-back" href="/">TradeBotV5</a>
          <h1>Options Auto</h1>
        </div>
        <div class="oa-status-grid">
          <div><span>Mode</span><strong id="oa-mode">PAPER</strong></div>
          <div><span>Kite</span><strong id="oa-kite">Disconnected</strong></div>
          <div><span>Data</span><strong id="oa-data">Waiting</strong></div>
          <div><span>Engine</span><strong id="oa-engine">Idle</strong></div>
          <div><span>Health</span><strong id="oa-health-top">-</strong></div>
          <div><span>Real Orders</span><strong id="oa-real-orders">Disabled</strong></div>
        </div>
      </header>

      <main class="oa-grid">
        <section class="oa-panel oa-settings">
          <div class="oa-panel-head">
            <h2>Settings</h2>
            <button type="button" id="oa-refresh">Refresh</button>
          </div>
          <div class="oa-form-grid">
            <label>Mode
              <select id="oa-setting-mode">
                <option>PAPER</option>
                <option>SHADOW</option>
                <option>BACKTEST</option>
                <option>REAL</option>
              </select>
            </label>
            <label>Symbol
              <select id="oa-underlying">
                <option>NIFTY</option>
                <option>SENSEX</option>
                <option>BANKNIFTY</option>
                <option>BANKEX</option>
              </select>
            </label>
            <label>Profile
              <select id="oa-profile">
                <option>BALANCED</option>
                <option>CONSERVATIVE</option>
                <option>AGGRESSIVE</option>
              </select>
            </label>
            <label>Score Threshold <input id="oa-score-threshold" type="number" min="0" max="100" step="1"></label>
            <label>Paper Balance <input id="oa-paper-balance" type="number" min="0" step="100"></label>
            <label>Max Capital % <input id="oa-capital-pct" type="number" min="1" max="100" step="1"></label>
            <label>Spot LTP <input id="oa-spot" type="number" step="0.05" value="22500"></label>
            <label>Quote Age Sec <input id="oa-quote-age" type="number" min="0" step="0.1" value="0"></label>
          </div>
          <div class="oa-toggle-row">
            <label><input id="oa-ask" type="checkbox"> Ask Permission</label>
            <label><input id="oa-auto" type="checkbox"> Auto Entry</label>
            <label><input id="oa-confirm-real" type="checkbox"> Real Confirmed</label>
            <label><input id="oa-static-ip" type="checkbox"> Static IP OK</label>
          </div>
          <div class="oa-action-row">
            <button type="button" id="oa-evaluate" class="primary">Evaluate</button>
            <button type="button" id="oa-shadow">Shadow</button>
            <button type="button" id="oa-paper">Paper</button>
            <button type="button" id="oa-paper-approval">Request Approval</button>
            <button type="button" id="oa-paper-approve">Approve</button>
            <button type="button" id="oa-paper-execute">Paper Execute</button>
            <button type="button" id="oa-paper-process">Process Market</button>
            <button type="button" id="oa-real-dry">Real Dry Run</button>
            <button type="button" id="oa-real-preflight">Real Preflight</button>
            <button type="button" id="oa-real-reconcile">Reconcile</button>
            <button type="button" id="oa-real-stop">Stop Entries</button>
            <button type="button" id="oa-real-safe">Safe Mode</button>
            <button type="button" id="oa-real-emergency">Emergency Plan</button>
            <button type="button" id="oa-readiness">Readiness</button>
            <button type="button" id="oa-health-check">Health</button>
            <button type="button" id="oa-backtest">Backtest</button>
            <button type="button" id="oa-shadow-report">Shadow Report</button>
            <button type="button" id="oa-promotion">Promotion</button>
            <button type="button" id="oa-drift">Drift</button>
            <button type="button" id="oa-missed">Missed Trades</button>
            <button type="button" id="oa-replay">Replay</button>
            <button type="button" id="oa-telegram-status">Telegram Status</button>
          </div>
        </section>

        <section class="oa-panel oa-center">
          <div class="oa-market-strip">
            <div><span>Market Cue</span><strong id="oa-cue">-</strong><small id="oa-cue-score">0</small></div>
            <div><span>Regime</span><strong id="oa-regime">-</strong><small id="oa-regime-side">WAIT</small></div>
            <div><span>Best Contract</span><strong id="oa-contract">-</strong><small id="oa-contract-score">0</small></div>
          </div>
          <div class="oa-plan">
            <h2>Trade Plan</h2>
            <div id="oa-plan-body" class="oa-plan-body"></div>
          </div>
          <div class="oa-safety-grid">
            <div id="oa-protected"><span>Position Protected</span><strong>NO</strong></div>
            <div id="oa-oco"><span>OCO Active</span><strong>NO</strong></div>
            <div id="oa-real"><span>Real Money</span><strong>NO</strong></div>
            <div id="oa-kite-safe"><span>Kite Connected</span><strong>NO</strong></div>
            <div id="oa-fresh"><span>Data Fresh</span><strong>NO</strong></div>
            <div id="oa-health"><span>Health</span><strong>-</strong></div>
            <div id="oa-reconcile"><span>Reconciled</span><strong>-</strong></div>
            <div id="oa-attention"><span>Manual Attention</span><strong>NO</strong></div>
          </div>
        </section>

        <section class="oa-panel oa-right">
          <h2>Inputs</h2>
          <label>Market Cue JSON
            <textarea id="oa-market-cue-json" spellcheck="false"></textarea>
          </label>
          <label>Instruments JSON
            <textarea id="oa-instruments-json" spellcheck="false"></textarea>
          </label>
          <label>Quotes JSON
            <textarea id="oa-quotes-json" spellcheck="false"></textarea>
          </label>
        </section>

        <section class="oa-panel oa-bottom">
          <div class="oa-tabs">
            <button type="button" class="active" data-oa-log="decision">Decision</button>
            <button type="button" data-oa-log="rejected">Rejected</button>
            <button type="button" data-oa-log="safety">Safety</button>
            <button type="button" data-oa-log="raw">Raw</button>
          </div>
          <pre id="oa-log"></pre>
        </section>
      </main>
    </div>
    <script src="/static/options_auto.js"></script>
  </body>
</html>
